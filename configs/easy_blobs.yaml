# Harness sanity check: 6 orthogonal concepts, a simple AND label.
# Everything should ace this. If the probe skyline can't hit ~1.0 recovery, or
# causal importance doesn't isolate z0/z1, the harness is broken (not the method).
name: easy_blobs

spec:
  dim: 32
  geometry: orthogonal
  noise: 0.10
  groups:
    - {kind: point, n: 6, p_active: 0.5}
  label: "AND(z0, z1)"

model:
  kind: mlp
  epochs: 60
  lr: 0.003
  model_kwargs: {hidden: 64, n_layers: 2}

n_train: 6000
n_val: 1500
seeds: [0, 1, 2]
min_accuracy: 0.95
interaction_concepts: [0, 1]

methods: [probe_skyline, pca, ica, relu_sae, topk_sae, ablation, patching, integrated_gradients, label_probe]
method_kwargs:
  relu_sae: {overcomplete: 4.0, l1: 0.003, epochs: 300}
  topk_sae: {overcomplete: 4.0, k: 1, epochs: 300}

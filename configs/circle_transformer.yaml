# Stage 2: a 1-layer transformer over token sequences. One circular concept
# (8 positions on a ring) plus point concepts. The sequence label fires when any
# token's ring position lands in an arc AND the last token has z0.
# Expectation: an overcomplete SAE *dilutes* the ring -- many atoms each covering
# an arc, high ring-coverage with high redundancy -- reproducing the capture
# regime from the neural-geometry literature.
name: circle_transformer

spec:
  dim: 24
  geometry: orthogonal
  noise: 0.05
  sequence: true
  seq_len: 12
  groups:
    - {kind: circle, n_positions: 8, name: ring}
    - {kind: point, n: 3, p_active: 0.4}
  label: "IN(ring, 2, 4)"                        # per-token (unused directly)
  sequence_label: "ANY(IN(ring, 2, 4)) & LAST(z0)"

model:
  kind: transformer
  epochs: 50
  lr: 0.001
  model_kwargs: {d_model: 48, n_layers: 1, n_heads: 4, max_len: 16}

n_train: 8000
n_val: 2000
seeds: [0, 1]
min_accuracy: 0.90
interaction_concepts: [0]                         # ring index (concept 0)

methods: [probe_skyline, pca, ica, relu_sae, topk_sae, ablation, patching, integrated_gradients, label_probe]
method_kwargs:
  relu_sae: {overcomplete: 6.0, l1: 0.002, epochs: 400}
  topk_sae: {overcomplete: 6.0, k: 2, epochs: 400}

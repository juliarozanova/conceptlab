# Stage 2: a 1-layer transformer over token sequences. One circular concept
# (8 positions on a ring) plus point concepts. The sequence label fires when any
# token's ring position lands in an arc AND the last token has z0.
# Expectation: an overcomplete SAE *dilutes* the ring -- many atoms each covering
# an arc, high ring-coverage with high redundancy -- reproducing the capture
# regime from the neural-geometry literature.
name: circle_transformer

spec:
  dim: 24
  geometry: orthogonal
  noise: 0.15              # overlapping blobs (3x the original), val acc ~0.99
  sequence: true
  seq_len: 12
  groups:
    # 12 ring positions: a finer manifold needs more arc atoms, which makes the
    # TopK dilution regime robust across seeds (redundancy 3.0-3.5).
    - {kind: circle, n_positions: 12, name: ring}
    - {kind: point, n: 3, p_active: 0.4}
  label: "IN(ring, 3, 6)"                        # per-token (unused directly)
  sequence_label: "ANY(IN(ring, 3, 6)) & LAST(z0)"

model:
  kind: transformer
  epochs: 50
  lr: 0.001
  model_kwargs: {d_model: 48, n_layers: 1, n_heads: 4, max_len: 16}

n_train: 8000
n_val: 2000
seeds: [0, 1]
min_accuracy: 0.85
interaction_concepts: [0]                         # ring index (concept 0)

methods: [probe_skyline, pca, ica, relu_sae, topk_sae, ablation, patching, integrated_gradients, label_probe]
method_kwargs:
  # Deliberate architectural contrast on the ring:
  #   ReLU+L1 (strong penalty) -> compact capture: +-axis-aligned atoms.
  #   TopK (k=2, high overcompleteness) -> dilution: arc atoms tiling the ring
  #     (coverage ~0.75, redundancy >2.5), reproducing the published regime.
  relu_sae: {overcomplete: 12.0, l1: 0.01, epochs: 500}
  topk_sae: {overcomplete: 12.0, k: 2, epochs: 500}
